<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculator</title>
</head>
<body>
    <div class="calculator" >
        <h1 id="heading">Calculator</h1>
        <div id="calculator-box">
            <input class="input" type="text" placeholder="0">
            <div class="all-button">

                <button class="buttons" id="ac">AC</button>
                <button class="buttons" id="del">DEL</button>
                <button class="buttons" id="percent">%</button>
                <button class="buttons" id="devide">/</button>
                <button class="buttons">7</button>
                <button class="buttons">8</button>
                <button class="buttons">9</button>
                <button class="buttons" id="multiply">*</button>
                <button class="buttons">4</button>
                <button class="buttons">5</button>
                <button class="buttons">6</button>
                <button class="buttons" id="subtraction">-</button>
                <button class="buttons">1</button>
                <button class="buttons">2</button>
                <button class="buttons">3</button>
                <button class="buttons" id="add">+</button>
                <button class="buttons">00</button>
                <button class="buttons">0</button>
                <button class="buttons">.</button>
                <button class="buttons" id="equal">=</button>

            </div>
            
        </div>

    </div>

    <script src="calculator.js"></script>
</body>
</html>
